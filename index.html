<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PA ATV GPS Trail Map</title>
  <meta name="theme-color" content="#14331f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app">

  <header>
    <div>
      <strong>Northcentral Regional ATV Trail</strong>
      <span>Offline map • GPS • Trailheads • Fuel</span>
    </div>
    <button id="installBtn" hidden>Install</button>
  </header>

  <main id="viewport">
    <div id="mapLayer">
      <img id="map" src="map.jpg" alt="Northcentral Regional ATV Trail Map">
      <div id="markerLayer"></div>
      <div id="gpsDot" hidden></div>
    </div>
  </main>

  <div id="trailBanner"></div>

  <section id="infoCard" hidden>
    <button id="closeCard">×</button>
    <h2 id="cardTitle"></h2>
    <p id="cardText"></p>
  </section>

  <section id="panel">
    <div class="row">
      <button data-view="full">Full Map</button>
      <button data-view="gps">GPS</button>
      <button data-view="susquehannock">Susquehannock</button>
      <button data-view="whiskey">Whiskey</button>
      <button data-view="haneyville">Haneyville</button>
      <button data-view="bloody">Bloody Skillet</button>
    </div>

    <div class="row">
      <button data-filter="all">All Markers</button>
      <button data-filter="hide">Hide Markers</button>
    </div>
  </section>

</div>

<script src="app.js?v=500"></script>
</body>
</html>
