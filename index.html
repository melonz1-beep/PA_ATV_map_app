<link rel="stylesheet" href="style.css">
</head>

<body>



  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PA ATV GPS Trail Map</title>
  <meta name="theme-color" content="#14331f">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">

  <body>

<div id="splash">
  <div class="splash-content">
    <img src="icon-192.png?v=10" class="splash-logo" alt="PA ATV GPS Trail Map icon">
    <h1>PA ATV GPS Trail Map</h1>
    <p>Northcentral Regional ATV Trail System</p>
    <div class="loader"></div>
  </div>
</div>

<div id="app">

  <main id="viewport">
    <div id="mapLayer">
      <img id="map" src="map.jpg" alt="Northcentral Regional ATV Trail Map">
      <div id="markerLayer"></div>
      <div id="gpsDot" hidden></div>
    </div>
  </main>

  <div id="trailBanner"></div>

  <section id="infoCard" hidden>
    <button id="closeCard">×</button>
    <h2 id="cardTitle"></h2>
    <p id="cardText"></p>
  </section>

  <section id="panel">
  <div class="row">
    <button data-view="full">Full Map</button>
    <button data-view="gps">GPS</button>
    <button data-view="susquehannock">Susquehannock</button>
    <button data-view="whiskey">Whiskey</button>
    <button data-view="haneyville">Haneyville</button>
    <button data-view="bloody">Bloody Skillet</button>
    <button data-view="emergency">🚨 Emergency</button>
  </div>

  <div class="row">
    <button data-filter="all">All Markers</button>
    <button data-filter="hide">Hide Markers</button>
  </div>
  </section>

<script src="app.js?v=1500"></script>
</body>
</html>
